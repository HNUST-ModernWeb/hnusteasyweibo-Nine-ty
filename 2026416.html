<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>简易微博 - 登录·分享生活</title>
    <style>
        /* ==================== 全局样式 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        :root {
            --primary-color: #1da1f2;
            --primary-dark: #0c8be0;
            --danger-color: #e0245e;
            --secondary-bg: #f5f8fa;
            --border-color: #e1e8ed;
            --text-dark: #14171a;
            --text-gray: #657786;
            --white: #ffffff;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --radius-md: 12px;
            --transition: all 0.2s ease;
        }

        body {
            background-color: var(--secondary-bg);
            color: var(--text-dark);
            line-height: 1.5;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--white);
            min-height: 100vh;
            box-shadow: var(--shadow-sm);
            position: relative;
        }

        /* 导航栏 */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: var(--white);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background-color: rgba(255,255,255,0.96);
        }

        .nav-item {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-gray);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            transition: var(--transition);
        }

        .nav-item.active {
            color: var(--primary-color);
            background-color: rgba(29, 161, 242, 0.1);
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            font-weight: 500;
        }
        .logout-btn:hover {
            background-color: rgba(224,36,94,0.1);
        }

        /* 页面视图 */
        .page {
            display: none;
            padding: 16px;
            animation: fadeIn 0.2s ease;
        }

        .page.active-page {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* 微博卡片 */
        .weibo-card {
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 14px;
            margin-bottom: 14px;
            transition: var(--transition);
        }
        .weibo-card:hover { box-shadow: var(--shadow-md); }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #1da1f2, #0a73b1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }
        .user-info { flex: 1; }
        .username { font-weight: 700; color: var(--text-dark); }
        .user-id { font-size: 13px; color: var(--text-gray); }
        .content { margin: 12px 0; font-size: 15px; word-break: break-word; white-space: pre-wrap; }
        .media-img { max-width: 100%; border-radius: 16px; margin-top: 8px; max-height: 300px; object-fit: cover; }
        .actions {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-gray);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 30px;
            transition: var(--transition);
        }
        .action-btn:hover { background-color: rgba(29,161,242,0.1); color: var(--primary-color); }
        .delete-btn:hover { background-color: rgba(224,36,94,0.1); color: var(--danger-color); }

        /* 表单样式 */
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 15px;
            transition: var(--transition);
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(29,161,242,0.2);
        }
        .error-msg { color: #e0245e; font-size: 12px; margin-top: 5px; display: block; }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
        }
        button:hover { background-color: var(--primary-dark); transform: scale(0.98); }
        .btn-secondary { background-color: #e1e8ed; color: var(--text-dark); }
        .btn-danger { background-color: var(--danger-color); }
        .btn-danger:hover { background-color: #c41e52; }

        /* 个人主页头部 */
        .profile-header {
            background: linear-gradient(145deg, #1da1f2, #0f7bc2);
            border-radius: var(--radius-md);
            padding: 24px 16px;
            color: white;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }
        .profile-avatar { width: 80px; height: 80px; background: white; color: var(--primary-color); font-size: 36px; margin: 0 auto 12px; cursor: pointer; }
        .edit-profile-btn { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.2); border: none; padding: 6px 12px; font-size: 13px; border-radius: 30px; }
        .bio-text { font-size: 14px; margin-top: 8px; opacity: 0.9; }
        .stats { display: flex; justify-content: center; gap: 24px; margin-top: 12px; }
        .stat-item { text-align: center; }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 24px;
            padding: 24px;
            animation: fadeIn 0.2s;
        }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        .empty-tip { text-align: center; color: var(--text-gray); padding: 40px 20px; }
        .char-counter { text-align: right; font-size: 12px; color: var(--text-gray); margin-top: 5px; }
        .char-counter.warning { color: #e0245e; }

        /* 登录注册页面专属 */
        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 32px 24px;
        }
        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: var(--shadow-md);
        }
        .auth-title { text-align: center; margin-bottom: 28px; color: var(--text-dark); }
        .auth-switch { text-align: center; margin-top: 20px; font-size: 14px; }
        .auth-switch a { color: var(--primary-color); cursor: pointer; text-decoration: none; font-weight: 600; }
        @media (max-width: 640px) { .container { max-width: 100%; } }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- 未登录时显示登录/注册界面 -->
    <div id="authView" style="display: flex; min-height: 100vh;">
        <div class="auth-container" style="width: 100%;">
            <div class="auth-card">
                <div class="auth-title">
                    <h2>🐦 简易微博</h2>
                    <p style="color: var(--text-gray);">分享生活，连接世界</p>
                </div>
                <!-- 登录表单 -->
                <div id="loginForm">
                    <div class="form-group">
                        <label>用户名 / 账号</label>
                        <input type="text" id="loginUsername" placeholder="请输入用户名">
                        <span id="loginError" class="error-msg"></span>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="loginPassword" placeholder="请输入密码">
                    </div>
                    <button id="doLoginBtn" style="width: 100%;">登录</button>
                    <div class="auth-switch">还没有账号？ <a id="showRegisterBtn">立即注册</a></div>
                </div>
                <!-- 注册表单 (初始隐藏) -->
                <div id="registerForm" style="display: none;">
                    <div class="form-group">
                        <label>昵称</label>
                        <input type="text" id="regName" placeholder="昵称">
                    </div>
                    <div class="form-group">
                        <label>用户名 (唯一)</label>
                        <input type="text" id="regUsername" placeholder="字母数字组合">
                        <span id="regUserError" class="error-msg"></span>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="regPassword" placeholder="至少4位">
                    </div>
                    <button id="doRegisterBtn" style="width: 100%;">注册</button>
                    <div class="auth-switch">已有账号？ <a id="showLoginBtn">去登录</a></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 主应用视图 (登录后可见) -->
    <div id="mainAppView" style="display: none;">
        <div class="nav-bar">
            <div class="nav-item" data-page="home">🏠 首页</div>
            <div class="nav-item" data-page="publish">✍️ 发布</div>
            <div class="nav-item" data-page="profile">👤 我的</div>
            <div class="nav-item logout-btn" id="logoutBtn">🚪 退出</div>
        </div>

        <div id="homePage" class="page active-page">
            <h3 style="margin-bottom: 12px;">🔥 热门微博</h3>
            <div id="feedList"></div>
            <div id="feedEmpty" class="empty-tip">✨ 暂无微博，去发布第一条吧！</div>
        </div>

        <div id="publishPage" class="page">
            <h3 style="margin-bottom: 20px;">📝 发布新微博</h3>
            <form id="publishForm">
                <div class="form-group">
                    <label>内容 <span style="color: #e0245e;">*</span></label>
                    <textarea id="weiboContent" rows="4" maxlength="280" placeholder="分享你的想法..."></textarea>
                    <div class="char-counter"><span id="charCount">0</span>/280</div>
                    <span id="contentError" class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label>图片链接 (可选)</label>
                    <input type="text" id="imageUrl" placeholder="https://...">
                </div>
                <button type="submit">📤 发布微博</button>
            </form>
            <div id="publishSuccess" style="margin-top: 16px; display: none; color: green; text-align: center;">✅ 发布成功！</div>
        </div>

        <div id="profilePage" class="page">
            <div class="profile-header">
                <button class="edit-profile-btn" id="editProfileBtn">✏️ 编辑资料</button>
                <div class="avatar profile-avatar" id="profileAvatar">微</div>
                <div class="username" id="profileName" style="color:white; font-size: 20px;"></div>
                <div class="user-id" id="profileUserId"></div>
                <div class="bio-text" id="profileBio"></div>
                <div class="stats">
                    <div class="stat-item"><strong id="postCount">0</strong><br>微博</div>
                    <div class="stat-item"><strong id="likeCount">0</strong><br>获赞</div>
                </div>
            </div>
            <h4 style="margin: 16px 0 8px;">📄 我的微博</h4>
            <div id="myPostsList"></div>
            <div id="myPostsEmpty" class="empty-tip">还没有发布过微博～</div>
        </div>
    </div>

    <!-- 编辑资料模态框 -->
    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <h3>编辑个人资料</h3>
            <div class="form-group"><label>昵称</label><input type="text" id="editName"></div>
            <div class="form-group"><label>个人简介</label><textarea id="editBio" rows="2" maxlength="60"></textarea></div>
            <div class="form-group"><label>头像文字</label><input type="text" id="editAvatarChar" maxlength="2"></div>
            <div class="modal-buttons"><button class="btn-secondary" id="closeModalBtn">取消</button><button id="saveProfileBtn">保存</button></div>
        </div>
    </div>
</div>

<script>
    // ------------------- 用户系统 + 多用户数据持久化 -------------------
    // 存储所有用户: { userId, username, password, name, bio, avatarInitial, posts: [] , likesGiven: [] }
    let usersDB = [];
    let currentSessionUser = null; // 当前登录用户对象

    // 初始化本地数据库
    function initUsersDB() {
        const stored = localStorage.getItem("weibo_users_v3");
        if(stored) {
            usersDB = JSON.parse(stored);
            // 兼容旧数据: 确保每个用户有 posts 和 likesGiven
            usersDB.forEach(user => {
                if(!user.posts) user.posts = [];
                if(!user.likesGiven) user.likesGiven = [];
                // 给每个post补充必要的字段
                user.posts.forEach(p => { if(p.commentsCount === undefined) p.commentsCount = 0; });
            });
        } else {
            // 创建默认测试用户
            const defaultUser = {
                userId: "user_001",
                username: "xiaoyou",
                password: "123456",
                name: "微博小友",
                bio: "热爱生活，分享点滴 ✨",
                avatarInitial: "微",
                posts: [
                    { id: "wb_001", content: "你好，微博世界！🌟 今天开始记录生活。", imageUrl: "", likes: 3, timestamp: Date.now() - 3600000, commentsCount: 1, userId: "user_001", userName: "微博小友", userAvatar: "微" },
                    { id: "wb_003", content: "响应式布局 + Flex/Grid 让前端开发更高效", imageUrl: "", likes: 2, timestamp: Date.now() - 86400000, commentsCount: 0, userId: "user_001", userName: "微博小友", userAvatar: "微" }
                ],
                likesGiven: ["wb_002"]  // 预点赞一条示例微博（需要公共微博存在）
            };
            const otherUser = {
                userId: "user_demo",
                username: "kejilin",
                password: "123456",
                name: "科技小林",
                bio: "科技爱好者",
                avatarInitial: "科",
                posts: [
                    { id: "wb_002", content: "Vue3 + 响应式真的太棒了！最近在学习组合式API，写代码如丝般顺滑。🚀", imageUrl: "https://picsum.photos/id/0/300/200", likes: 7, timestamp: Date.now() - 7200000, commentsCount: 2, userId: "user_demo", userName: "科技小林", userAvatar: "科" }
                ],
                likesGiven: []
            };
            usersDB = [defaultUser, otherUser];
            saveUsersDB();
        }
        // 同步全局微博列表给未登录缓存，但最终展示基于全量聚合
    }

    function saveUsersDB() {
        localStorage.setItem("weibo_users_v3", JSON.stringify(usersDB));
    }

    // 获取全平台所有微博（用于信息流）
    function getAllPosts() {
        let allPosts = [];
        usersDB.forEach(user => {
            if(user.posts && user.posts.length) {
                allPosts.push(...user.posts.map(p => ({ ...p, authorUser: { name: user.name, avatar: user.avatarInitial, userId: user.userId, username: user.username } })));
            }
        });
        // 按时间倒序
        return allPosts.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
    }

    // 获取当前登录用户的所有微博
    function getCurrentUserPosts() {
        if(!currentSessionUser) return [];
        const user = usersDB.find(u => u.userId === currentSessionUser.userId);
        return user ? (user.posts || []).sort((a,b)=>b.timestamp - a.timestamp) : [];
    }

    // 保存当前用户的帖子到DB
    function saveCurrentUserPosts(posts) {
        if(!currentSessionUser) return;
        const userIndex = usersDB.findIndex(u => u.userId === currentSessionUser.userId);
        if(userIndex !== -1) {
            usersDB[userIndex].posts = posts;
            saveUsersDB();
            // 同步session中的基础信息
            currentSessionUser.posts = posts;
        }
    }

    // 更新当前用户资料
    function updateCurrentUserProfile(name, bio, avatarInitial) {
        if(!currentSessionUser) return;
        const user = usersDB.find(u => u.userId === currentSessionUser.userId);
        if(user) {
            user.name = name;
            user.bio = bio;
            user.avatarInitial = avatarInitial;
            // 更新该用户所有帖子的作者名称和头像
            user.posts.forEach(p => { p.userName = name; p.userAvatar = avatarInitial; });
            saveUsersDB();
            currentSessionUser.name = name;
            currentSessionUser.bio = bio;
            currentSessionUser.avatarInitial = avatarInitial;
        }
    }

    // 点赞逻辑 (跨用户)
    function toggleLike(postId) {
        if(!currentSessionUser) return false;
        // 找到帖子所属用户和帖子
        for(let user of usersDB) {
            const post = user.posts.find(p => p.id === postId);
            if(post) {
                const userLikes = currentSessionUser.likesGiven || [];
                const hasLiked = userLikes.includes(postId);
                if(hasLiked) {
                    // 取消点赞
                    post.likes = Math.max(0, (post.likes || 0) - 1);
                    currentSessionUser.likesGiven = userLikes.filter(id => id !== postId);
                } else {
                    post.likes = (post.likes || 0) + 1;
                    currentSessionUser.likesGiven.push(postId);
                }
                // 更新数据库
                const curUserIdx = usersDB.findIndex(u => u.userId === currentSessionUser.userId);
                if(curUserIdx !== -1) usersDB[curUserIdx].likesGiven = currentSessionUser.likesGiven;
                saveUsersDB();
                return true;
            }
        }
        return false;
    }

    function addComment(postId) {
        for(let user of usersDB) {
            const post = user.posts.find(p => p.id === postId);
            if(post) {
                post.commentsCount = (post.commentsCount || 0) + 1;
                saveUsersDB();
                return true;
            }
        }
        return false;
    }

    function deletePost(postId) {
        if(!currentSessionUser) return false;
        const user = usersDB.find(u => u.userId === currentSessionUser.userId);
        if(user) {
            const idx = user.posts.findIndex(p => p.id === postId);
            if(idx !== -1) {
                user.posts.splice(idx,1);
                saveUsersDB();
                return true;
            }
        }
        return false;
    }

    function createNewPost(content, imageUrl) {
        if(!currentSessionUser) return;
        const newId = "wb_" + Date.now() + "_" + Math.floor(Math.random()*10000);
        const newPost = {
            id: newId,
            userId: currentSessionUser.userId,
            userName: currentSessionUser.name,
            userAvatar: currentSessionUser.avatarInitial,
            content: content,
            imageUrl: imageUrl,
            likes: 0,
            timestamp: Date.now(),
            commentsCount: 0
        };
        const user = usersDB.find(u => u.userId === currentSessionUser.userId);
        if(user) {
            if(!user.posts) user.posts = [];
            user.posts.unshift(newPost);
            saveUsersDB();
        }
    }

    // ---------- UI 渲染 ----------
    function renderFeed() {
        const feedContainer = document.getElementById("feedList");
        const feedEmpty = document.getElementById("feedEmpty");
        const allPosts = getAllPosts();
        if(!allPosts.length) { feedContainer.innerHTML = ''; feedEmpty.style.display = 'block'; return; }
        feedEmpty.style.display = 'none';
        feedContainer.innerHTML = allPosts.map(post => createPostHTML(post)).join('');
        attachCardEvents();
    }

    function renderProfile() {
        if(!currentSessionUser) return;
        const myPosts = getCurrentUserPosts();
        const container = document.getElementById("myPostsList");
        const emptyDiv = document.getElementById("myPostsEmpty");
        if(!myPosts.length) { container.innerHTML = ''; emptyDiv.style.display = 'block'; }
        else { emptyDiv.style.display = 'none'; container.innerHTML = myPosts.map(post => createPostHTML(post, true)).join(''); attachCardEvents(); }
        document.getElementById("postCount").innerText = myPosts.length;
        const totalLikes = myPosts.reduce((sum,p)=>sum+(p.likes||0),0);
        document.getElementById("likeCount").innerText = totalLikes;
        document.getElementById("profileName").innerText = currentSessionUser.name;
        document.getElementById("profileUserId").innerHTML = `@${currentSessionUser.username}`;
        document.getElementById("profileBio").innerHTML = currentSessionUser.bio || "这个人很懒～";
        document.getElementById("profileAvatar").innerText = currentSessionUser.avatarInitial || "微";
    }

    function createPostHTML(post, isOwner = false) {
        const currentUserLikes = currentSessionUser?.likesGiven || [];
        const isLiked = currentUserLikes.includes(post.id);
        const heartIcon = isLiked ? '❤️' : '🤍';
        const likeColor = isLiked ? 'style="color:#e0245e;"' : '';
        const imgHtml = post.imageUrl ? `<img class="media-img" src="${post.imageUrl}" onerror="this.style.display='none'">` : '';
        const deleteBtn = (isOwner || post.userId === currentSessionUser?.userId) ? `<button class="action-btn delete-btn" data-id="${post.id}">🗑️ 删除</button>` : '';
        return `
            <div class="weibo-card" data-id="${post.id}">
                <div class="card-header">
                    <div class="avatar">${escapeHtml(post.userAvatar || post.userName?.[0] || 'U')}</div>
                    <div class="user-info">
                        <div class="username">${escapeHtml(post.userName)}</div>
                        <div class="user-id">@${escapeHtml(post.username || post.userId)} · ${formatTime(post.timestamp)}</div>
                    </div>
                </div>
                <div class="content">${escapeHtml(post.content).replace(/\n/g,'<br>')}</div>
                ${imgHtml}
                <div class="actions">
                    <button class="action-btn like-btn" data-id="${post.id}" ${likeColor}>${heartIcon} <span>${post.likes || 0}</span></button>
                    <button class="action-btn comment-btn" data-id="${post.id}">💬 评论 <span>${post.commentsCount || 0}</span></button>
                    ${deleteBtn}
                </div>
            </div>
        `;
    }

    function attachCardEvents() {
        document.querySelectorAll('.like-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); toggleLike(btn.dataset.id); renderAll(); }));
        document.querySelectorAll('.comment-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); if(addComment(btn.dataset.id)) renderAll(); showToast("💬 评论成功", "info"); }));
        document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); if(confirm("删除这条微博？")) { deletePost(btn.dataset.id); renderAll(); showToast("已删除","success"); } }));
    }

    function renderAll() { renderFeed(); renderProfile(); }
    function formatTime(ts) { const diff = Date.now() - ts; if(diff<60000) return '刚刚'; if(diff<3600000) return `${Math.floor(diff/60000)}分钟前`; if(diff<86400000) return `${Math.floor(diff/3600000)}小时前`; return `${Math.floor(diff/86400000)}天前`; }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function showToast(msg) { let t=document.createElement('div'); t.innerText=msg; t.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1da1f2;color:white;padding:8px 20px;border-radius:40px;z-index:9999'; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }

    // 登录注册逻辑
    function login(username, pwd) {
        const user = usersDB.find(u => u.username === username && u.password === pwd);
        if(user) {
            currentSessionUser = { userId: user.userId, username: user.username, name: user.name, bio: user.bio, avatarInitial: user.avatarInitial, likesGiven: user.likesGiven || [] };
            localStorage.setItem("weibo_session", JSON.stringify({ userId: user.userId }));
            showAppView();
            renderAll();
            return true;
        } else { document.getElementById("loginError").innerText = "用户名或密码错误"; return false; }
    }
    function register(name, username, pwd) {
        if(usersDB.find(u=>u.username===username)) { document.getElementById("regUserError").innerText = "用户名已存在"; return false; }
        if(!username.match(/^[a-zA-Z0-9_]{3,16}$/)) { document.getElementById("regUserError").innerText = "用户名3-16位字母数字"; return false; }
        if(pwd.length<4) { alert("密码至少4位"); return false; }
        const newId = "user_"+Date.now();
        const newUser = { userId: newId, username, password: pwd, name: name || username, bio: "新朋友，打个招呼吧～", avatarInitial: name?.[0] || "新", posts: [], likesGiven: [] };
        usersDB.push(newUser);
        saveUsersDB();
        alert("注册成功，请登录");
        toggleAuthForms(true);
        return true;
    }
    function toggleAuthForms(showLogin) { document.getElementById("loginForm").style.display = showLogin ? "block" : "none"; document.getElementById("registerForm").style.display = showLogin ? "none" : "block"; }
    function showAppView() { document.getElementById("authView").style.display = "none"; document.getElementById("mainAppView").style.display = "block"; }
    function logout() { localStorage.removeItem("weibo_session"); currentSessionUser = null; document.getElementById("authView").style.display = "flex"; document.getElementById("mainAppView").style.display = "none"; toggleAuthForms(true); }

    // 检查自动登录
    function autoLogin() { const sess = localStorage.getItem("weibo_session"); if(sess) { const { userId } = JSON.parse(sess); const user = usersDB.find(u=>u.userId===userId); if(user) { currentSessionUser = { userId: user.userId, username: user.username, name: user.name, bio: user.bio, avatarInitial: user.avatarInitial, likesGiven: user.likesGiven || [] }; showAppView(); renderAll(); return true; } } return false; }

    // 绑定事件
    document.getElementById("doLoginBtn")?.addEventListener("click", () => login(document.getElementById("loginUsername").value, document.getElementById("loginPassword").value));
    document.getElementById("doRegisterBtn")?.addEventListener("click", () => register(document.getElementById("regName").value, document.getElementById("regUsername").value, document.getElementById("regPassword").value));
    document.getElementById("showRegisterBtn")?.addEventListener("click", () => toggleAuthForms(false));
    document.getElementById("showLoginBtn")?.addEventListener("click", () => toggleAuthForms(true));
    document.getElementById("logoutBtn")?.addEventListener("click", logout);
    // 发布功能
    document.getElementById("publishForm")?.addEventListener("submit", (e) => { e.preventDefault(); const con = document.getElementById("weiboContent").value.trim(); if(!con) { alert("内容不能为空"); return; } createNewPost(con, document.getElementById("imageUrl").value.trim()); document.getElementById("weiboContent").value = ""; document.getElementById("imageUrl").value = ""; document.getElementById("charCount").innerText="0"; showToast("发布成功"); renderAll(); switchPage('home'); });
    document.getElementById("weiboContent")?.addEventListener("input", function() { document.getElementById("charCount").innerText = this.value.length; });
    function switchPage(pageId) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page')); document.getElementById(`${pageId}Page`).classList.add('active-page'); if(pageId==='profile') renderProfile(); if(pageId==='home') renderFeed(); }
    document.querySelectorAll('.nav-item[data-page]').forEach(nav=>nav.addEventListener('click',()=>switchPage(nav.dataset.page)));
    // 编辑资料模态框
    const modal = document.getElementById("editProfileModal");
    document.getElementById("editProfileBtn")?.addEventListener("click",()=>{ document.getElementById("editName").value=currentSessionUser.name; document.getElementById("editBio").value=currentSessionUser.bio||''; document.getElementById("editAvatarChar").value=currentSessionUser.avatarInitial||''; modal.classList.add("active"); });
    document.getElementById("closeModalBtn")?.addEventListener("click",()=>modal.classList.remove("active"));
    document.getElementById("saveProfileBtn")?.addEventListener("click",()=>{ updateCurrentUserProfile(document.getElementById("editName").value, document.getElementById("editBio").value, document.getElementById("editAvatarChar").value); modal.classList.remove("active"); renderAll(); showToast("资料已更新"); });
    window.onclick = (e) => { if(e.target === modal) modal.classList.remove("active"); };
    // 启动
    initUsersDB();
    if(!autoLogin()) { document.getElementById("authView").style.display = "flex"; document.getElementById("mainAppView").style.display = "none"; }
    else { document.getElementById("authView").style.display = "none"; document.getElementById("mainAppView").style.display = "block"; }
</script>
</body>
</html>
